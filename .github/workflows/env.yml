name: Env
on: [push, workflow_dispatch]
env:
  NODE_ENV: production
  GH_SECRET: 1111
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Print env build
        run: |
          echo "${{env.NODE_ENV}}"
          echo "${{env.GH_SECRET}}"
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Print env deploy
        run: |
          echo "${{env.NODE_ENV}}"
          echo "${{env.GH_SECRET}}"
name: Deploy React App
on: push
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Get the repo code
        uses: actions/checkout@v3
      - name: Install dependecies
        run: npm ci
      - name: Test app
        run: npm run test
  lint: 
    runs-on: ubuntu-latest
    steps:
      - name: Get the repo code
        uses: actions/checkout@v3
      - name: Install dependecies
        run: npm ci
      - name: lint app
        run: npm run lint
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Get the repo code
        uses: actions/checkout@v3
      - name: Install dependecies
        run: npm ci
      - name: build app
        run: npm run build
      - name: deploy
        run: echo deploying...
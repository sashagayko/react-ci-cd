name: Deploy React App
on: 
  push:
    branches:
      - main
    # paths-ignore:
    #   - '.github/workflows/*'
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Get the repo code
        uses: actions/checkout@v5
      - name: Cache deps
        uses: actions/cache@v5
        with:
          path: ~/.npm
          key: node-modules-${{ hashFiles('**/package-lock.json') }}
      - name: Install dependecies
        run: npm ci
      - name: Test app
        run: npm run test
  lint: 
    runs-on: ubuntu-latest
    # needs: test
    steps:
      - name: Get the repo code
        uses: actions/checkout@v5
      - name: Cache deps
        uses: actions/cache@v5
        with:
          path: ~/.npm
          key: node-modules-${{ hashFiles('**/package-lock.json') }}
      - name: Install dependecies
        run: npm ci
      - name: lint app
        run: npm run lint
  build:
    needs: [lint, test]
    continue-on-error: true
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{matrix.os}}
    steps:
      - name: Get the repo code
        uses: actions/checkout@v5
      - name: Cache deps
        uses: actions/cache@v5
        with:
          path: ~/.npm
          key: node-modules-${{ hashFiles('**/package-lock.json') }}
      - name: Install dependecies
        run: npm ci
      - name: build app
        run: npm run build
      - name: deploy
        run: echo deploying...